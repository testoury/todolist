<!doctype html>
<html lang="en">
  <head>
    <title>Weekly Planner</title>
    <link rel="icon" type="image/png" href="./assest/to-do-list.png" />
    <meta
      charset="UTF-8"
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <!-- Top header -->
    <div class="header">
      <h1>
        TO-DO LIST
        <img
          src="https://cdn-icons-png.flaticon.com/512/11253/11253063.png"
          alt="icon"
        />
      </h1>
    </div>
    <div class="todoFormdiv">
      <form class="todoForm">
        <select id="daySelect">
          <option value="">Pick a day</option>
          <option value="monday">Monday</option>
          <option value="tuesday">Tuesday</option>
          <option value="wednesday">Wednesday</option>
          <option value="thursday">Thursday</option>
          <option value="friday">Friday</option>
        </select>
        <input
          type="text"
          id="taskInput"
          placeholder="Enter a task"
          autofocus
        />
        <button type="submit">Add</button>
      </form>
    </div>
    <!-- Bottom day cards -->
    <div class="bottom-cards">
      <div class="container" data-day="monday">
        <h2>MONDAY</h2>
        <ul class="todoList"></ul>
      </div>

      <div class="container" data-day="tuesday">
        <h2>TUESDAY</h2>

        <ul class="todoList"></ul>
      </div>

      <div class="container" data-day="wednesday">
        <h2>WEDNESDAY</h2>

        <ul class="todoList"></ul>
      </div>

      <div class="container" data-day="thursday">
        <h2>THURSDAY</h2>

        <ul class="todoList"></ul>
      </div>

      <div class="container" data-day="friday">
        <h2>FRIDAY</h2>

        <ul class="todoList"></ul>
      </div>
      <div class="container" data-day="missed">
        <h2>MISSED TASKS</h2>

        <ul class="todoList"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
